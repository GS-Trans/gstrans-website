<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Refrigerated truck -->
  <path d="M 10 30 L 14 16 Q 14 12 18 12 L 48 12 Q 52 12 52 16 L 52 36 Q 52 40 48 40 L 12 40 Q 10 40 10 38 Z"/>
  <!-- Refrigeration unit (top) -->
  <rect x="48" y="10" width="8" height="6" rx="1" fill="currentColor" opacity="0.3"/>
  <!-- Temperature indicator -->
  <path d="M 52 6 L 52 10" stroke-width="1.5"/>
  <!-- Cold lines/waves -->
  <path d="M 18 20 Q 20 18 22 20" opacity="0.4"/>
  <path d="M 30 22 Q 32 20 34 22" opacity="0.4"/>
  <path d="M 42 20 Q 44 18 46 20" opacity="0.4"/>
  <!-- Wheels -->
  <circle cx="22" cy="44" r="4"/>
  <circle cx="42" cy="44" r="4"/>
  <!-- Insulation indication -->
  <rect x="20" y="24" width="2" height="12" opacity="0.3"/>
  <rect x="42" y="24" width="2" height="12" opacity="0.3"/>
</svg>