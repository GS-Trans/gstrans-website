<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Last-mile delivery - compact vehicle -->
  <path d="M 12 32 L 16 18 Q 16 14 20 14 L 48 14 L 50 28 L 50 38 Q 50 42 46 42 L 14 42 Q 12 42 12 40 Z"/>
  <!-- Small cabin -->
  <rect x="18" y="16" width="8" height="10" rx="1" opacity="0.3"/>
  <!-- Package in cargo area -->
  <rect x="30" y="20" width="14" height="16" rx="1" fill="currentColor" opacity="0.15"/>
  <!-- Package details -->
  <line x1="37" y1="22" x2="37" y2="34"/>
  <line x1="32" y1="28" x2="42" y2="28"/>
  <!-- Wheels -->
  <circle cx="22" cy="46" r="4"/>
  <circle cx="40" cy="46" r="4"/>
  <!-- E-commerce indicator (checkmark style) -->
  <path d="M 52 16 L 56 20 L 60 14" stroke-width="1.5" opacity="0.6"/>
  <!-- Delivery indicator -->
  <circle cx="56" cy="28" r="3" opacity="0.4"/>
</svg>